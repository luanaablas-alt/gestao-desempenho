<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Desempenho — Login</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'DM Sans', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Gestão de Desempenho</h1>
      <p class="text-gray-500 text-sm mt-1">Acesse sua conta para continuar</p>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
          <input id="email" type="email" required autocomplete="email"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
            placeholder="seu@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input id="password" type="password" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
            placeholder="••••••••">
        </div>
        <div id="error-msg" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
        <button type="submit" id="submit-btn"
          class="w-full bg-indigo-600 text-white rounded-lg py-2.5 font-semibold hover:bg-indigo-700 transition-colors">
          Entrar
        </button>
      </form>
      <div class="mt-4 text-center">
        <button onclick="document.getElementById('recovery-panel').classList.remove('hidden')" class="text-sm text-indigo-600 hover:underline">
          Esqueceu sua senha?
        </button>
      </div>
    </div>

    <div id="recovery-panel" class="hidden mt-4 bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
      <h2 class="font-semibold text-gray-800 mb-3">Recuperar Senha</h2>
      <form id="recovery-form" class="space-y-3">
        <input id="recovery-email" type="email" required placeholder="seu@email.com"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <div id="recovery-msg" class="hidden text-sm rounded-lg px-3 py-2"></div>
        <div class="flex gap-2">
          <button type="submit" class="flex-1 bg-indigo-600 text-white rounded-lg py-2 font-medium">Enviar link</button>
          <button type="button" onclick="document.getElementById('recovery-panel').classList.add('hidden')" class="flex-1 bg-gray-100 text-gray-700 rounded-lg py-2 font-medium">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const SUPABASE_URL      = 'https://uafenvoiyltoziiechxg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhZmVudm9peWx0b3ppaWVjaHhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyODI2MzEsImV4cCI6MjA5Nzg1ODYzMX0.JfHu-8wZjpfnbXRbTFNWUyydN0fyxINBTbU5lGtBZTM';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Se já está logado, redireciona
    sb.auth.getSession().then(({ data: { session } }) => {
      if (!session) return;
      sb.from('usuarios').select('perfil').eq('id', session.user.id).single().then(({ data: u }) => {
        if (u) window.location.replace(u.perfil === 'admin' ? '/admin/' : '/gestor/');
      });
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      btn.disabled = true; btn.textContent = 'Entrando...';
      errEl.classList.add('hidden');

      const { data, error } = await sb.auth.signInWithPassword({
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      });

      if (error) {
        errEl.textContent = traduzirErro(error.message);
        errEl.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Entrar';
        return;
      }

      const { data: usuario } = await sb.from('usuarios').select('perfil,ativo').eq('id', data.user.id).single();

      if (!usuario?.ativo) {
        await sb.auth.signOut();
        errEl.textContent = 'Conta desativada. Contate o administrador.';
        errEl.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Entrar';
        return;
      }

      window.location.replace(usuario.perfil === 'admin' ? '/admin/' : '/gestor/');
    });

    // Recuperação de senha
    document.getElementById('recovery-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('recovery-email').value.trim();
      const msgEl = document.getElementById('recovery-msg');
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: `${window.location.origin}/login.html`,
      });
      if (error) {
        msgEl.className = 'text-sm rounded-lg px-3 py-2 bg-red-50 text-red-600 border border-red-200';
        msgEl.textContent = 'Erro ao enviar. Verifique o e-mail.';
      } else {
        msgEl.className = 'text-sm rounded-lg px-3 py-2 bg-green-50 text-green-700 border border-green-200';
        msgEl.textContent = 'Link enviado! Verifique sua caixa de entrada.';
      }
      msgEl.classList.remove('hidden');
    });

    function traduzirErro(msg) {
      return 'Erro: ' + msg;
    }
  </script>
</body>
</html>
